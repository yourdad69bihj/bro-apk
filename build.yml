name: Subway Max APK Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apktool
          # Download the latest signer that supports Samsung Android 14+
          wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O signer.jar

      - name: Decompile Original
        # MAKE SURE your file is named subway.apk in your repo!
        run: apktool d subway.apk -o source_folder

      - name: Inject Max Coins/Keys
        # This runs your Python script to edit the JSON values
        run: python3 scripts/mod_logic.py

      - name: Rebuild Raw APK
        run: apktool b source_folder -o raw_output.apk

      - name: Pro Signing (The Samsung Fix)
        # --v2SigningEnabled and --v3SigningEnabled are CRITICAL
        run: |
          java -jar signer.jar --apk raw_output.apk --allowResign --v2SigningEnabled true --v3SigningEnabled true --v4SigningEnabled false

      - name: Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Subway-Mod-Final
          path: ./*-aligned-debugSigned.apk
