name: Subway Surfers Max Mod
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17 (Required for modern APKs)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Modding Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apktool
          # Download Uber APK Signer (The best tool for Samsung compatibility)
          wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O signer.jar

      - name: Decompile APK
        # This assumes your original apk is named 'subway.apk' in your repo
        run: apktool d subway.apk -o decompiled_fs

      - name: Run Mod Script
        # This runs the Python script we made earlier to set coins to 2.1 billion
        run: python3 scripts/mod_logic.py

      - name: Rebuild APK
        run: apktool b decompiled_fs -o subway_unsigned.apk

      - name: Advanced Sign & Align (Samsung Fix)
        # This step is the "Magic Fix" for Samsung. 
        # It adds V2/V3 signatures and ZipAligns the data.
        run: |
          java -jar signer.jar --apk subway_unsigned.apk --allowResign --v2SigningEnabled true --v3SigningEnabled true

      - name: Upload Modded APK
        uses: actions/upload-artifact@v4
        with:
          name: Subway-Surfers-Max-Keys
          # The signer renames the file to include "-aligned-debugSigned"
          path: ./*-aligned-debugSigned.apk
